name: Bug 报告
description: 报告网络切换应用的 Bug 或问题
title: "[BUG] "
labels: ["bug", "triage"]
assignees:
  - aunchagaonkar

body:
  - type: markdown
    attributes:
      value: |
        感谢您填写此 Bug 报告！请尽可能提供详细信息，以帮助我们解决问题。

  - type: checkboxes
    id: terms
    attributes:
      label: 前提条件
      options:
        - label: 我已搜索现有 Issue，确认这不是重复问题
          required: true
        - label: 我已阅读相关文档
          required: true
        - label: 我正在使用最新版本的应用
          required: true

  - type: dropdown
    id: device-type
    attributes:
      label: 设备类型
      description: 您使用的是什么类型的设备？
      options:
        - Android 手机
        - Android 平板
        - 其他（请在描述中注明）
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android 版本
      description: 您运行的是哪个版本的 Android？
      placeholder: "例如：Android 14、Android 13 等"
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: 应用版本
      description: 您使用的是哪个版本的网络切换？
      placeholder: "例如：v1.0.9"
    validations:
      required: true

  - type: dropdown
    id: root-method
    attributes:
      label: Root/权限方式
      description: 您如何为应用提供 Root 访问权限？
      options:
        - Root（Magisk）
        - Root（SuperSU）
        - Shizuku
        - 未 Root / 无特殊权限
        - 其他（请注明）
    validations:
      required: true

  - type: textarea
    id: bug-description
    attributes:
      label: Bug 描述
      description: 请清晰简洁地描述该 Bug 是什么
      placeholder: 描述您遇到的问题...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: 复现步骤
      description: 复现该行为的步骤
      placeholder: |
        1. 前往"..."
        2. 点击"..."
        3. 滚动到"..."
        4. 出现错误
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: 预期行为
      description: 请清晰简洁地描述您期望发生的情况
      placeholder: 应该发生什么？
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: 实际行为
      description: 实际发生了什么？
      placeholder: 实际发生了什么？
    validations:
      required: true

  - type: dropdown
    id: network-type
    attributes:
      label: 受影响的网络类型
      description: 此问题影响哪种网络类型？
      multiple: true
      options:
        - 5G
        - 4G/LTE
        - 3G
        - 2G
        - WiFi
        - 所有网络类型
        - 与网络无关

  - type: textarea
    id: logs
    attributes:
      label: 日志
      description: 如适用，请添加日志以帮助解释问题
      placeholder: 在此粘贴相关日志...
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如适用，请添加截图以帮助解释问题
      placeholder: 将图片拖放至此处或粘贴图片链接

  - type: textarea
    id: additional-context
    attributes:
      label: 附加信息
      description: 在此添加有关问题的任何其他背景信息
      placeholder: 任何可能有帮助的附加信息...

  - type: input
    id: device-model
    attributes:
      label: 设备型号
      description: 您使用的是什么设备型号？
      placeholder: "例如：Samsung Galaxy S24、Pixel 8 Pro 等"

  - type: input
    id: carrier
    attributes:
      label: 运营商
      description: 您使用的是哪家移动运营商？
      placeholder: "例如：中国移动、中国联通、中国电信等"
      
